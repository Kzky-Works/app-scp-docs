# 本リポ（app-scp-docs）のスクリプトで Wikidot を収集し、成果物を Kzky-Works/data-scp-docs の list/jp/ へ push する。
# 前提: リポジトリシークレット DATA_SCP_DOCS_PUSH_TOKEN（data-scp-docs へ contents:write できる PAT）
name: Update data-scp-docs list/jp

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * *"

permissions:
  contents: read

concurrency:
  group: data-scp-docs-list-jp-write
  cancel-in-progress: false

jobs:
  harvest:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout app-scp-docs
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout data-scp-docs
        uses: actions/checkout@v4
        with:
          repository: Kzky-Works/data-scp-docs
          ref: main
          path: data-scp-docs
          token: ${{ secrets.DATA_SCP_DOCS_PUSH_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euxo pipefail
          pip install -r contrib/data-scp-docs/requirements.txt

      - name: Run harvester
        run: |
          set -euxo pipefail
          python3 contrib/data-scp-docs/scripts/harvester.py --output-dir data-scp-docs/list/jp
          python3 contrib/data-scp-docs/scripts/validate_manifests.py data-scp-docs/list/jp
          ls -la data-scp-docs/list/jp/

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          cd data-scp-docs
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add list/jp/
          if git diff --staged --quiet; then
            echo "No changes — skipping commit."
            exit 0
          fi
          git commit -m "chore(data): refresh list/jp feeds [skip ci]"
          git fetch origin main
          git rebase origin/main
          git push origin main
