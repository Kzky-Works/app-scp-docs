# SCP-JP 一覧 JSON を生成し、gh-pages に scp_list.json のみ公開する。
#
# 運用: リポジトリ Settings → Pages → Branch: gh-pages, / (root)
# アプリ: AppRemoteConfig.scpListJSONURLString に
#   https://<owner>.github.io/<repo>/scp_list.json を設定

name: Deploy SCP list JSON

on:
  schedule:
    # 00:00 UTC = 同日 09:00 JST
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: deploy-scp-list
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          set -euxo pipefail
          pip install -r requirements.txt
          pip freeze | grep -Ei '^(beautifulsoup4|requests)=' || true

      # メタデータは Wikidot への逐次アクセスのため --with-article-metadata が必要。
      # TODO: 検証後、--metadata-max-articles 5 を外して全件取得に戻す。
      - name: Run scraper
        run: |
          set -euxo pipefail
          python update_list.py \
            --with-article-metadata \
            --metadata-max-articles 5 \
            --verbose
          ls -la scp_list.json

      - name: Prepare publish dir
        run: |
          mkdir -p _site
          cp scp_list.json _site/scp_list.json
          ls -la _site/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages
          force_orphan: true
